# 06-network-policies.yaml — OpenEMR namespace NetworkPolicy
#
# In ambient mode, ztunnel intercepts ALL pod traffic at the Linux network
# namespace level via HBONE. From the perspective of the pod network and the
# Kubernetes NetworkPolicy controller, every inbound connection appears to
# originate from ztunnel — not from the original source pod or namespace.
#
# This makes traditional granular NetworkPolicies (deny-all + per-service
# allow rules based on namespace or pod selectors) incompatible with ambient
# mode. Regardless of how the rules are written, the actual packet source is
# always ztunnel, so per-service allows never match and traffic is silently
# dropped.
#
# Security enforcement is instead provided by the mesh:
#
#   - ztunnel enforces L4 AuthorizationPolicies (source service account,
#     port) via SPIFFE identity — stronger than IP-based NetworkPolicy.
#   - The waypoint proxy enforces L7 AuthorizationPolicies (HTTP method,
#     path, headers, JWT claims) for traffic needing application-layer control.
#
# The single allow-all policy below opens NetworkPolicy enforcement so it
# does not conflict with the mesh. All meaningful access control is provided
# by 05-authz-policies.yaml.
#
# Reference: https://istio.io/latest/docs/ambient/usage/networkpolicy/
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-ingress
  namespace: openemr
  annotations:
    # Rationale: ambient mode ztunnel intercepts all traffic at node level.
    # NetworkPolicy source selectors never match original pod identity.
    # Enforcement is delegated entirely to ztunnel AuthorizationPolicies.
    mesh.istio.io/policy-mode: "ambient-delegated"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - {}