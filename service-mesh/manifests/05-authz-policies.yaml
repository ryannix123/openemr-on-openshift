---
# ──────────────────────────────────────────────────────────────
# Default DENY — all traffic in the openemr namespace is blocked
# unless explicitly allowed below.
#
# In ambient mode (ztunnel-only, no waypoint), this is enforced
# at L4 by ztunnel. When a waypoint proxy is added, enforcement
# moves to L7 at the waypoint.
# ──────────────────────────────────────────────────────────────
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: openemr
spec: {} # Empty spec = deny all by default

---
# ──────────────────────────────────────────────────────────────
# Allow the OpenShift Router (ingress) to reach the OpenEMR pod.
#
# IMPORTANT: Do NOT use targetRef: waypoint here unless a waypoint
# proxy is actually deployed. When targetRef points to a non-existent
# Gateway, Istio reports "not bound" and the policy is never enforced,
# causing all ingress traffic to be blocked by deny-all.
#
# The router has no SPIFFE identity, so we allow by port only.
# OVN-K NetworkPolicy (allow-router-to-openemr) handles source restriction.
# ──────────────────────────────────────────────────────────────
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-openemr
  namespace: openemr
spec:
  action: ALLOW
  rules:
    - to:
        - operation:
            ports: ["8080"]

---
# ──────────────────────────────────────────────────────────────
# Allow OpenEMR → MariaDB (identity-based via SPIFFE/mTLS)
# ztunnel validates mutual TLS and enforces source principal.
# ──────────────────────────────────────────────────────────────
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-openemr-to-mariadb
  namespace: openemr
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/openemr/sa/default"
      to:
        - operation:
            ports: ["3306"]

---
# ──────────────────────────────────────────────────────────────
# Allow OpenEMR → Redis (identity-based via SPIFFE/mTLS)
# ──────────────────────────────────────────────────────────────
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-openemr-to-redis
  namespace: openemr
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/openemr/sa/default"
      to:
        - operation:
            ports: ["6379"]
