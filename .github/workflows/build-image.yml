# ═══════════════════════════════════════════════════════════════════════════════
# OpenEMR Container Build Pipeline
# Builds with Docker buildx and pushes to Quay.io
# ═══════════════════════════════════════════════════════════════════════════════
#
# Required GitHub Secrets:
#   QUAY_USERNAME - Quay.io robot account (format: username+robotname)
#   QUAY_PASSWORD - Quay.io robot token
#
# Usage:
#   - Manual: Actions → Build and Push OpenEMR → Run workflow
#   - Scheduled: Runs daily at 6am UTC, builds only if a new upstream release
#     is detected (compares latest OpenEMR tag against Quay registry)
#   - On push: Always builds when Containerfile or workflow changes on main
# ═══════════════════════════════════════════════════════════════════════════════

name: Build and Push OpenEMR

on:
  # Manual trigger with optional version override
  workflow_dispatch:
    inputs:
      openemr_version:
        description: 'OpenEMR version to build (e.g., 8.0.0.3). Leave empty to auto-detect latest.'
        required: false
        default: ''

  # Daily check — only builds if a new upstream release is detected
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

  # Always build on push when container-related files change
  push:
    branches: [main]
    paths:
      - 'Containerfile'
      - 'configs/**'
      - 'scripts/**'
      - '.github/workflows/build-image.yml'

env:
  REGISTRY: quay.io
  IMAGE_NAME: ryan_nix/openemr-openshift

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────────
      # Determine which OpenEMR version to build
      #
      # Priority:
      #   1. Manual workflow_dispatch input (if provided)
      #   2. Auto-detect latest stable release from GitHub tags
      #      (scheduled runs + dispatch without version + push)
      #   3. Fallback: extract version from Containerfile ARG
      # ─────────────────────────────────────────────────────────────────────────
      - name: Determine OpenEMR version
        id: version
        run: |
          # --- Option 1: Manual input ---
          if [ -n "${{ inputs.openemr_version }}" ]; then
            VERSION="${{ inputs.openemr_version }}"
            echo "📌 Using manually specified version: ${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "### 📦 Build Version: ${VERSION} (manual)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # --- Option 2: Auto-detect latest stable tag from upstream ---
          echo "🔍 Querying OpenEMR GitHub tags for latest stable release..."
          LATEST_TAG=$(curl -sf "https://api.github.com/repos/openemr/openemr/tags?per_page=100" \
            | jq -r '.[].name' \
            | grep -E '^v[0-9]+_[0-9]+_[0-9]+(_[0-9]+)?$' \
            | sed 's/^v//; s/_/./g' \
            | sort -V \
            | tail -1)

          if [ -n "$LATEST_TAG" ]; then
            VERSION="${LATEST_TAG}"
            echo "✅ Latest upstream release detected: ${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "### 📦 Build Version: ${VERSION} (auto-detected)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # --- Option 3: Fallback to Containerfile ---
          echo "⚠️  GitHub API query returned no results — falling back to Containerfile"
          VERSION=$(grep -oP 'OPENEMR_VERSION=\K[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?' Containerfile | head -1)
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not determine version from any source"
            exit 1
          fi
          echo "📄 Using version from Containerfile: ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "### 📦 Build Version: ${VERSION} (Containerfile fallback)" >> $GITHUB_STEP_SUMMARY

      # ─────────────────────────────────────────────────────────────────────────
      # Check if this version already exists in Quay.
      # Skips the build on scheduled runs if nothing has changed upstream.
      # Manual triggers and push events always proceed regardless.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Check if version already exists in registry
        id: version_check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EVENT="${{ github.event_name }}"

          # Manual triggers and push events always build
          if [ "$EVENT" = "workflow_dispatch" ] || [ "$EVENT" = "push" ]; then
            echo "🔨 Event '${EVENT}' — always building"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # For scheduled runs, check if the tag already exists in Quay
          TAG_EXISTS=$(curl -sf \
            "https://quay.io/api/v1/repository/${{ env.IMAGE_NAME }}/tag/?specificTag=${VERSION}" \
            | jq -r '.tags | length')

          if [ "$TAG_EXISTS" -gt 0 ]; then
            echo "⏭️  ${VERSION} already in registry — skipping build"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "### ⏭️ No new release — build skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Current version:** \`${VERSION}\` is already in the registry." >> $GITHUB_STEP_SUMMARY
          else
            echo "🆕 New version ${VERSION} detected — proceeding with build"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # Set up Docker Buildx
      # ─────────────────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        if: steps.version_check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────────────────────────────────────────
      # Log in to Quay.io
      # ─────────────────────────────────────────────────────────────────────────
      - name: Log in to Quay.io
        if: steps.version_check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      # ─────────────────────────────────────────────────────────────────────────
      # Extract metadata for Docker labels and tags
      # ─────────────────────────────────────────────────────────────────────────
      - name: Extract Docker metadata
        if: steps.version_check.outputs.skip == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      # ─────────────────────────────────────────────────────────────────────────
      # Build and push the container image.
      # OPENEMR_VERSION is passed as a build-arg so the Containerfile clones
      # the correct upstream tag regardless of what's hardcoded in the ARG default.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build and push OpenEMR image
        if: steps.version_check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENEMR_VERSION=${{ steps.version.outputs.version }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ─────────────────────────────────────────────────────────────────────────
      # Build summary
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build summary
        if: steps.version_check.outputs.skip == 'false'
        run: |
          echo "### ✅ Build completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images pushed:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** [quay.io/${{ env.IMAGE_NAME }}](https://${{ env.REGISTRY }}/repository/${{ env.IMAGE_NAME }})" >> $GITHUB_STEP_SUMMARY
